<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}JobLink Dashboard{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

  <header class="site-header">
    <a href="{{ url_for('jobs.job_list') }}" class="site-title">JobLink</a>
    <span class="site-subtitle">Dashboard</span>
  </header>

  <main class="main-content">
    {% block content %}{% endblock %}
  </main>

</body>
</html>
